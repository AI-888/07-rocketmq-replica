# HA Sync Sink 默认配置文件
# 配置优先级: 环境变量 > 命令行参数 > 配置文件 > 默认值

# === 必填参数 ===
# 目标集群 NameServer 地址
#targetNamesrv=127.0.0.1:9877

# === 可选参数 ===
# Sink HTTP 监控端口（默认: 9877）
#sinkMetricsPort=9877

# Sink 节点唯一标识（默认: hostname:pid）
#sinkId=sink-node-01

# 批量发送大小（默认: 100）
#sinkBatchSize=100

# 并发写入线程数（默认: 4）
#sinkThreads=4

# 写入失败最大重试次数（默认: 3）
#sinkMaxRetry=3

# 目标集群探活间隔（默认: 30000ms）
#targetProbeInterval=30000

# 启动一致性校验消息条数（默认: 10，0=跳过）
#startupCheckMsgCount=10

# Topic 按需同步最大重试次数（默认: 3）
#topicSyncMaxRetry=3
