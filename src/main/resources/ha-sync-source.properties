# HA Sync Source 默认配置文件
# 配置优先级: 环境变量 > 命令行参数 > 配置文件 > 默认值

# === 必填参数 ===
# 源集群 NameServer 地址（多个以 ; 分隔）
#sourceNamesrv=127.0.0.1:9876;127.0.0.2:9876

# 目标集群 NameServer 地址
#targetNamesrv=127.0.0.1:9877

# === 可选参数 ===
# Source HTTP 监控端口（默认: 9876）
#sourceMetricsPort=9876

# 向 Master 上报偏移量间隔（默认: 5000ms）
#heartbeatInterval=5000

# 轮询 NameServer 检测 Master 变更间隔（默认: 30000ms）
#masterPollInterval=30000

# Checkpoint 刷写间隔（默认: 1000ms）
#checkpointFlushInterval=1000

# 累计 n 个数据包触发 Checkpoint 刷写（默认: 100）
#checkpointFlushBatchSize=100

# Source 节点标识（默认: hostname:pid）
#sourceNodeId=source-node-01

# ZeroMQ REP Socket 绑定端口（默认: 5555）
#zmqBindPort=5555

# RFQ 专用 Topic 名称（默认: ha-sync-rfq）
#rfqTopic=ha-sync-rfq

# RFQ Producer Group（默认: ha-sync-rfq-producer）
#rfqProducerGroup=ha-sync-rfq-producer

# RFQ 消息发送最大重试次数（默认: 3）
#rfqMaxRetry=3

# 解析失败暂停检测滑动窗口（默认: 60000ms）
#parseErrorSuspendWindowMs=60000

# 元数据同步间隔（默认: 60000ms）
#metaSyncInterval=60000
