# RocketMQ HA Sync 测试集群
# 架构：3 NameServer + 2 源集群 Broker + 2 目标集群 Broker + 1 Dashboard
# 两个 Broker 集群名不同，连接同一组 NameServer

version: '3.8'

x-namesrv-env: &namesrv-env
  JAVA_OPT_EXT: "-Xms256m -Xmx256m -Xmn128m"

x-broker-env: &broker-env
  NAMESRV_ADDR: "namesrv-1:9876;namesrv-2:9876;namesrv-3:9876"
  JAVA_OPT_EXT: "-Xms512m -Xmx512m -Xmn256m"

services:
  # ==================== NameServer 集群（3 节点） ====================

  namesrv-1:
    image: apache/rocketmq:5.1.3
    container_name: rmq-namesrv-1
    ports:
      - "9876:9876"
    environment:
      <<: *namesrv-env
    command: sh mqnamesrv
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  namesrv-2:
    image: apache/rocketmq:5.1.3
    container_name: rmq-namesrv-2
    ports:
      - "9877:9876"
    environment:
      <<: *namesrv-env
    command: sh mqnamesrv
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  namesrv-3:
    image: apache/rocketmq:5.1.3
    container_name: rmq-namesrv-3
    ports:
      - "9878:9876"
    environment:
      <<: *namesrv-env
    command: sh mqnamesrv
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ==================== 源集群 Broker（SourceCluster，2 节点） ====================

  src-broker-a:
    image: apache/rocketmq:5.1.3
    container_name: rmq-src-broker-a
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      <<: *broker-env
    volumes:
      - ./docker/broker-conf/src-broker-a.conf:/home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    depends_on:
      namesrv-1:
        condition: service_healthy
      namesrv-2:
        condition: service_healthy
      namesrv-3:
        condition: service_healthy
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  src-broker-b:
    image: apache/rocketmq:5.1.3
    container_name: rmq-src-broker-b
    ports:
      - "10921:10911"
      - "10919:10909"
    environment:
      <<: *broker-env
    volumes:
      - ./docker/broker-conf/src-broker-b.conf:/home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    depends_on:
      namesrv-1:
        condition: service_healthy
      namesrv-2:
        condition: service_healthy
      namesrv-3:
        condition: service_healthy
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  # ==================== 目标集群 Broker（SinkCluster，2 节点） ====================

  tgt-broker-a:
    image: apache/rocketmq:5.1.3
    container_name: rmq-tgt-broker-a
    ports:
      - "10931:10911"
      - "10929:10909"
    environment:
      <<: *broker-env
    volumes:
      - ./docker/broker-conf/tgt-broker-a.conf:/home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    depends_on:
      namesrv-1:
        condition: service_healthy
      namesrv-2:
        condition: service_healthy
      namesrv-3:
        condition: service_healthy
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  tgt-broker-b:
    image: apache/rocketmq:5.1.3
    container_name: rmq-tgt-broker-b
    ports:
      - "10941:10911"
      - "10939:10909"
    environment:
      <<: *broker-env
    volumes:
      - ./docker/broker-conf/tgt-broker-b.conf:/home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.1.3/conf/broker.conf
    depends_on:
      namesrv-1:
        condition: service_healthy
      namesrv-2:
        condition: service_healthy
      namesrv-3:
        condition: service_healthy
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  # ==================== RocketMQ Dashboard ====================

  dashboard:
    image: apacherocketmq/rocketmq-dashboard:1.0.0
    container_name: rmq-dashboard
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: >-
        -Drocketmq.namesrv.addr=namesrv-1:9876;namesrv-2:9876;namesrv-3:9876
        -Xms128m -Xmx256m
    depends_on:
      src-broker-a:
        condition: service_healthy
      tgt-broker-a:
        condition: service_healthy
    networks:
      - rmq-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  rmq-net:
    driver: bridge
